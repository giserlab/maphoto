        name: data
        required: true
        schema:
          $ref: '#/definitions/form.UserConfigUpdateForm'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: update user map config
      tags:
      - user
  /api/v1/user/del/{id}:
    get:
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: delete user
      tags:
      - user
  /api/v1/user/login:
    post:
      parameters:
      - description: UserLoginForm
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/form.UserLoginForm'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      summary: user login
      tags:
      - user
  /api/v1/user/logout:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: user login
      tags:
      - user
  /api/v1/user/update/{id}:
    post:
      consumes:
      - application/json
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      - description: data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/form.UserAdminUpdateForm'
      responses:
        "200":
          description: OK
