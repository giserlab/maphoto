      - JWT: []
      summary: get all users
      tags:
      - user
securityDefinitions:
  JWT:
    description: |-
      Bearer Token 格式：`Bearer {token}`
      JWT Authorization header
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
