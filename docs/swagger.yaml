definitions:
  api.Response:
    properties:
      code:
        description: 状态码
        example: 200
        type: integer
      data:
        description: 数据
      message:
        description: 消息
        example: Success
        type: string
      status:
        description: 状态
        type: boolean
    type: object
  form.PlaceAddForm:
    properties:
      cover:
        type: string
      desc:
        type: string
      group:
        type: string
      lat:
        type: number
      lon:
        type: number
      name:
        type: string
      photos:
        items:
          type: string
        type: array
    type: object
  form.PlaceAttachForm:
    properties:
      id:
        type: integer
      url:
        type: string
    type: object
  form.PlaceCoverForm:
    properties:
      id:
        type: integer
      url:
        type: string
    type: object
  form.PlacePicDelPost:
    properties:
      id:
        type: integer
      url:
        type: string
    type: object
  form.PlaceUpdateForm:
    properties:
      cover:
        type: string
      desc:
        type: string
      group:
        type: string
      lat:
        type: number
      lon:
        type: number
      name:
        type: string
    type: object
  form.UserAdminUpdateForm:
    properties:
      admin:
        type: boolean
      password:
        type: string
    type: object
  form.UserConfigUpdateForm:
    properties:
      autoCenter:
        type: boolean
      iconSize:
        type: integer
      lat:
        type: number
      link:
        type: string
      lon:
        type: number
      maxZoom:
        type: integer
      minZoom:
        type: integer
      note:
        type: string
      title:
        type: string
      tolorance:
        type: number
      zoom:
        type: integer
    type: object
  form.UserCreateForm:
    properties:
      admin:
        type: boolean
      password:
        minLength: 6
        type: string
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  form.UserLoginForm:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
host: localhost:8090
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger Example API
  version: "1.0"
paths:
  /api/v1/place/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: PlaceAddForm
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/form.PlaceAddForm'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: add place
      tags:
      - place
  /api/v1/place/all:
    get:
      consumes:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: get place
      tags:
      - place
  /api/v1/place/cover:
    post:
      consumes:
      - application/json
      parameters:
      - description: PlaceCoverForm
        in: body
        name: data
