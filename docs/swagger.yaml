      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: place change cover
      tags:
      - place
  /api/v1/place/del/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: delete place
      tags:
      - place
  /api/v1/place/init/{username}:
    get:
      parameters:
      - description: username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: place init
      tags:
      - place
  /api/v1/place/pic/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: PlaceAttachForm
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/form.PlaceAttachForm'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: place add picture
      tags:
      - place
  /api/v1/place/pic/del:
    post:
      consumes:
      - application/json
      parameters:
      - description: data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/form.PlacePicDelPost'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: delete place pic
      tags:
      - place
  /api/v1/place/update/{id}:
    post:
      consumes:
      - application/json
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: integer
      - description: data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/form.PlaceUpdateForm'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: update props of  place
      tags:
      - place
  /api/v1/share/{username}:
    get:
      parameters:
      - description: username
        in: path
        name: username
        required: true
        type: string
      - description: group name
        in: query
        name: group
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.Response'
      summary: user share place
      tags:
      - user
  /api/v1/storage/files:
    get:
      parameters:
      - description: '文件夹: thumbs 或 photos，不传则返回所有'
        in: query
        name: folder
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: 获取本地存储文件列表
      tags:
      - storage
  /api/v1/storage/files/{folder}/{filename}:
    delete:
      parameters:
      - description: '文件夹: thumbs 或 photos'
        in: path
        name: folder
        required: true
        type: string
      - description: 文件名
        in: path
        name: filename
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: 删除本地存储文件
      tags:
      - storage
  /api/v1/storage/files/{folder}/{filename}/rename:
    post:
      parameters:
      - description: '文件夹: thumbs 或 photos'
        in: path
        name: folder
        required: true
        type: string
      - description: 原文件名
        in: path
        name: filename
        required: true
        type: string
      - description: 新文件名
        in: formData
        name: newName
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: 重命名本地存储文件
      tags:
      - storage
  /api/v1/storage/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: '目标文件夹: thumbs 或 photos'
        in: formData
        name: folder
        required: true
        type: string
      - description: 要上传的文件
        in: formData
        name: files
        required: true
        type: file
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - JWT: []
      summary: 上传文件到本地存储
      tags:
      - storage
  /api/v1/user/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/form.UserCreateForm'
      responses:
